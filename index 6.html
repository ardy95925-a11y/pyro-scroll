<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idle Game - Skill Tree</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        button { -webkit-user-select: text; user-select: text; }
        
        @keyframes bookOpen {
            0% {
                opacity: 0;
                transform: perspective(1200px) rotateY(90deg) scale(0.8);
            }
            100% {
                opacity: 1;
                transform: perspective(1200px) rotateY(0deg) scale(1);
            }
        }
        
        @keyframes pageSlide {
            0% { transform: translateX(-20px); opacity: 0; }
            100% { transform: translateX(0); opacity: 1; }
        }
        
        .book-open {
            animation: bookOpen 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        
        .skill-card {
            animation: pageSlide 0.5s ease-out forwards;
        }
        
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950">
    <div id="app"></div>

    <script>
        class ClickGame {
            constructor() {
                this.points = 0;
                this.skillTreeOpen = false;
                this.purchasedSkills = new Set();
                this.clickValue = 1;
                this.autoClickRate = 0;
                this.autoInterval = null;
                this.skillTree = this.initSkillTree();
                this.init();
            }

            initSkillTree() {
                return [
                    {
                        id: 'click1',
                        name: 'Enhanced Strike',
                        tier: 1,
                        cost: 100,
                        effect: '+1 Click Value',
                        action: () => { this.clickValue += 1; }
                    },
                    {
                        id: 'click2',
                        name: 'Power Blow',
                        tier: 1,
                        cost: 250,
                        effect: '+3 Click Value',
                        requires: 'click1',
                        action: () => { this.clickValue += 3; }
                    },
                    {
                        id: 'click3',
                        name: 'Resonance',
                        tier: 1,
                        cost: 500,
                        effect: '+5 Click Value',
                        requires: 'click2',
                        action: () => { this.clickValue += 5; }
                    },
                    {
                        id: 'auto1',
                        name: 'Idle Energy',
                        tier: 2,
                        cost: 150,
                        effect: '+0.5 Points/sec',
                        action: () => { this.autoClickRate += 0.5; }
                    },
                    {
                        id: 'auto2',
                        name: 'Momentum',
                        tier: 2,
                        cost: 350,
                        effect: '+2 Points/sec',
                        requires: 'auto1',
                        action: () => { this.autoClickRate += 2; }
                    },
                    {
                        id: 'auto3',
                        name: 'Cascade',
                        tier: 2,
                        cost: 1000,
                        effect: '+5 Points/sec',
                        requires: 'auto2',
                        action: () => { this.autoClickRate += 5; }
                    },
                    {
                        id: 'multi1',
                        name: 'Amplify',
                        tier: 3,
                        cost: 500,
                        effect: '+10% All Gains',
                        requires: 'click2',
                        action: () => {
                            this.clickValue = Math.floor(this.clickValue * 1.1);
                            this.autoClickRate = this.autoClickRate * 1.1;
                        }
                    },
                    {
                        id: 'multi2',
                        name: 'Overload',
                        tier: 3,
                        cost: 2000,
                        effect: 'x2 All Gains',
                        requires: 'multi1',
                        action: () => {
                            this.clickValue *= 2;
                            this.autoClickRate *= 2;
                        }
                    }
                ];
            }

            init() {
                this.startAutoClick();
                this.render();
            }

            startAutoClick() {
                if (this.autoInterval) clearInterval(this.autoInterval);
                this.autoInterval = setInterval(() => {
                    if (this.autoClickRate > 0) {
                        this.points += this.autoClickRate;
                        this.render();
                    }
                }, 1000);
            }

            handleClick() {
                this.points += this.clickValue;
                this.render();
            }

            toggleSkillTree() {
                this.skillTreeOpen = !this.skillTreeOpen;
                this.render();
            }

            canPurchase(skill) {
                if (this.purchasedSkills.has(skill.id)) return false;
                if (this.points < skill.cost) return false;
                if (skill.requires && !this.purchasedSkills.has(skill.requires)) return false;
                return true;
            }

            buySkill(index) {
                const skill = this.skillTree[index];
                if (this.canPurchase(skill)) {
                    this.points -= skill.cost;
                    this.purchasedSkills.add(skill.id);
                    skill.action();
                    this.startAutoClick();
                    this.render();
                }
            }

            render() {
                const html = `
                    <div class="min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950 text-white font-sans overflow-hidden">
                        <!-- Background effect -->
                        <div class="fixed inset-0 opacity-30 pointer-events-none">
                            <div class="absolute inset-0 bg-[radial-gradient(circle_at_20%_50%,rgba(100,200,255,0.1),transparent_50%)]"></div>
                            <div class="absolute inset-0 bg-[radial-gradient(circle_at_80%_80%,rgba(200,100,255,0.1),transparent_50%)]"></div>
                        </div>

                        <!-- Main Game Container -->
                        <div class="relative z-10 h-screen flex flex-col items-center justify-center px-4">
                            <!-- Points Display -->
                            <div class="mb-12 text-center">
                                <div class="text-sm uppercase tracking-widest text-slate-400 mb-3 font-light">Current Points</div>
                                <div class="text-7xl font-light tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-slate-100 to-slate-300">
                                    ${Math.floor(this.points)}
                                </div>
                                <div class="mt-4 text-xs text-slate-500">
                                    +${this.clickValue.toFixed(1)} per click • +${this.autoClickRate.toFixed(1)}/sec
                                </div>
                            </div>

                            <!-- Main Click Button -->
                            <button onclick="game.handleClick()" class="mb-16 group relative active:scale-95 transition-transform">
                                <div class="absolute inset-0 bg-gradient-to-br from-cyan-500/20 to-transparent rounded-2xl blur-3xl opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                                <div class="relative px-12 py-8 bg-gradient-to-br from-slate-800 to-slate-900 border border-slate-700 rounded-2xl hover:border-slate-600 transition-all duration-200 cursor-pointer shadow-2xl">
                                    <span class="text-2xl font-light tracking-wide">GENERATE</span>
                                </div>
                            </button>

                            <!-- Skill Tree Button -->
                            <button onclick="game.toggleSkillTree()" class="flex items-center gap-3 px-6 py-3 rounded-lg bg-slate-800/50 border border-slate-700 hover:border-slate-500 hover:bg-slate-800/70 transition-all duration-200 text-sm uppercase tracking-widest font-light">
                                <span>Skill Tree</span>
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="9 18 15 12 9 6"></polyline>
                                </svg>
                            </button>
                        </div>

                        <!-- Skill Tree Modal -->
                        ${this.skillTreeOpen ? this.renderSkillTree() : ''}
                    </div>
                `;

                document.getElementById('app').innerHTML = html;
            }

            renderSkillTree() {
                const tier1 = this.skillTree.filter(s => s.tier === 1);
                const tier2 = this.skillTree.filter(s => s.tier === 2);
                const tier3 = this.skillTree.filter(s => s.tier === 3);

                const renderSkills = (skills, delayStart) => {
                    return skills.map((skill, idx) => {
                        const isPurchased = this.purchasedSkills.has(skill.id);
                        const canBuy = this.canPurchase(skill);
                        const delay = (delayStart + idx) * 0.1;
                        const skillIndex = this.skillTree.indexOf(skill);
                        
                        const bgClass = isPurchased 
                            ? 'bg-slate-700/30 border-slate-600 opacity-50 cursor-default'
                            : canBuy 
                            ? 'bg-slate-800/60 border-slate-600 hover:border-slate-500 hover:bg-slate-800/80 cursor-pointer'
                            : 'bg-slate-800/30 border-slate-700 opacity-50 cursor-not-allowed';

                        return `
                            <button onclick="game.buySkill(${skillIndex})" ${!canBuy ? 'disabled' : ''} style="animation-delay: ${delay}s; pointer-events: ${canBuy || isPurchased ? 'auto' : 'none'}" class="skill-card w-full group">
                                <div class="${bgClass} p-4 rounded-lg border transition-all duration-200">
                                    <div class="flex justify-between items-start mb-2">
                                        <h3 class="text-sm font-light tracking-wide text-left">${skill.name}</h3>
                                        ${isPurchased ? '<span class="text-xs text-cyan-400 font-light">✓</span>' : ''}
                                    </div>
                                    <p class="text-xs text-slate-400 mb-3 text-left">${skill.effect}</p>
                                    <div class="text-xs text-slate-500 text-left">
                                        ${isPurchased ? 'Purchased' : skill.cost + ' points'}
                                    </div>
                                </div>
                            </button>
                        `;
                    }).join('');
                };

                return `
                    <div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm">
                        <div class="relative w-full max-w-5xl max-h-[90vh]">
                            <div class="relative w-full h-full book-open">
                                <div class="absolute left-1/2 top-0 bottom-0 w-1 bg-gradient-to-b from-slate-950 via-slate-800 to-slate-950 transform -translate-x-1/2 shadow-lg pointer-events-none"></div>
                                
                                <div class="relative bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 rounded-lg border border-slate-700 shadow-2xl overflow-hidden">
                                    <button onclick="game.toggleSkillTree()" class="absolute top-6 right-6 z-10 p-2 hover:bg-slate-700/50 rounded-lg transition-colors">
                                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                            <line x1="18" y1="6" x2="6" y2="18"></line>
                                            <line x1="6" y1="6" x2="18" y2="18"></line>
                                        </svg>
                                    </button>

                                    <div class="border-b border-slate-700 px-8 py-8 bg-gradient-to-r from-slate-800/50 to-transparent">
                                        <h2 class="text-3xl font-light tracking-wider mb-2">SKILL TREE</h2>
                                        <p class="text-sm text-slate-400">Progress through tiers to unlock powerful enhancements</p>
                                    </div>

                                    <div class="p-8 overflow-y-auto max-h-[calc(90vh-180px)]">
                                        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                                            <!-- Tier 1 -->
                                            <div class="space-y-4">
                                                <div class="text-xs uppercase tracking-widest text-slate-400 font-light">TIER 1</div>
                                                <div class="text-lg font-light text-slate-200 mb-6">Click Power</div>
                                                <div class="space-y-4">
                                                    ${renderSkills(tier1, 0)}
                                                </div>
                                            </div>

                                            <!-- Tier 2 -->
                                            <div class="space-y-4">
                                                <div class="text-xs uppercase tracking-widest text-slate-400 font-light">TIER 2</div>
                                                <div class="text-lg font-light text-slate-200 mb-6">Automation</div>
                                                <div class="space-y-4">
                                                    ${renderSkills(tier2, 3)}
                                                </div>
                                            </div>

                                            <!-- Tier 3 -->
                                            <div class="space-y-4">
                                                <div class="text-xs uppercase tracking-widest text-slate-400 font-light">TIER 3</div>
                                                <div class="text-lg font-light text-slate-200 mb-6">Multipliers</div>
                                                <div class="space-y-4">
                                                    ${renderSkills(tier3, 6)}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }
        }

        let game;
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                game = new ClickGame();
            });
        } else {
            game = new ClickGame();
        }
    </script>
</body>
</html>
