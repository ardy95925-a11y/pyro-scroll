<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Tree - Ascend Through Infinite Progression</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { box-sizing: border-box; }
        html, body, #root { width: 100%; height: 100%; }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Courier Prime', monospace;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        const { useState } = React;

        const SkillTreeGame = () => {
            const initialSkills = {
                strength: { level: 0, cost: 10, x: 10, y: 10, description: 'Physical power' },
                dexterity: { level: 0, cost: 10, x: 30, y: 10, description: 'Agility' },
                intelligence: { level: 0, cost: 10, x: 50, y: 10, description: 'Mental acuity' },
                
                swordmastery: { level: 0, cost: 15, x: 5, y: 30, description: 'Melee combat', requires: ['strength'] },
                archery: { level: 0, cost: 15, x: 20, y: 30, description: 'Ranged combat', requires: ['dexterity'] },
                magic: { level: 0, cost: 15, x: 50, y: 30, description: 'Spellcasting', requires: ['intelligence'] },
                
                weaponsmith: { level: 0, cost: 25, x: 2, y: 50, description: 'Forge weapons', requires: ['swordmastery'] },
                shadowstrike: { level: 0, cost: 25, x: 18, y: 50, description: 'Stealth attacks', requires: ['archery', 'dexterity'] },
                pyromancy: { level: 0, cost: 30, x: 45, y: 50, description: 'Fire magic', requires: ['magic'] },
                cryomancy: { level: 0, cost: 30, x: 55, y: 50, description: 'Ice magic', requires: ['magic'] },
                
                berserker: { level: 0, cost: 40, x: 8, y: 70, description: 'Rage mode', requires: ['strength', 'weaponsmith'] },
                assassin: { level: 0, cost: 40, x: 15, y: 70, description: 'Ultimate stealth', requires: ['shadowstrike', 'dexterity'] },
                spellweaver: { level: 0, cost: 45, x: 50, y: 70, description: 'Combine spells', requires: ['pyromancy', 'cryomancy'] },
                
                apotheosis: { level: 0, cost: 100, x: 25, y: 90, description: 'Ultimate power', requires: ['berserker', 'assassin', 'spellweaver'] },
            };

            const [skills, setSkills] = useState(initialSkills);
            const [points, setPoints] = useState(0);
            const [totalSpent, setTotalSpent] = useState(0);

            const canUpgrade = (skillName) => {
                const skill = skills[skillName];
                if (points < skill.cost) return false;
                
                if (skill.requires) {
                    return skill.requires.every(req => skills[req].level > 0);
                }
                return true;
            };

            const upgrade = (skillName) => {
                if (!canUpgrade(skillName)) return;
                
                const skill = skills[skillName];
                setSkills(prev => ({
                    ...prev,
                    [skillName]: {
                        ...prev[skillName],
                        level: prev[skillName].level + 1,
                        cost: Math.floor(prev[skillName].cost * 1.15)
                    }
                }));
                
                setPoints(prev => prev - skill.cost);
                setTotalSpent(prev => prev + skill.cost);
            };

            const downgrade = (skillName) => {
                const skill = skills[skillName];
                if (skill.level === 0) return;
                
                const originalCost = Math.floor(skill.cost / 1.15);
                
                setSkills(prev => ({
                    ...prev,
                    [skillName]: {
                        ...prev[skillName],
                        level: prev[skillName].level - 1,
                        cost: originalCost
                    }
                }));
                
                setPoints(prev => prev + originalCost);
                setTotalSpent(prev => prev - originalCost);
            };

            const reset = () => {
                setSkills(initialSkills);
                setPoints(0);
                setTotalSpent(0);
            };

            const addPoints = () => setPoints(prev => prev + 100);

            const MinusIcon = () => (
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
            );

            const PlusIcon = () => (
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
            );

            const RotateIcon = () => (
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                    <polyline points="23 4 23 10 17 10"></polyline>
                    <path d="M20.49 15a9 9 0 1 1-2-8.83"></path>
                </svg>
            );

            return React.createElement(
                'div',
                { className: 'min-h-screen bg-black text-gray-200', style: { fontFamily: "'Courier Prime', monospace" } },
                
                // Header
                React.createElement(
                    'div',
                    { className: 'border-b border-gray-800 bg-gray-950 px-6 py-6' },
                    React.createElement(
                        'div',
                        { className: 'max-w-7xl mx-auto flex justify-between items-start' },
                        React.createElement(
                            'div',
                            null,
                            React.createElement('h1', { className: 'text-3xl font-bold text-gray-100 mb-2 tracking-tight' }, 'SKILL TREE'),
                            React.createElement('p', { className: 'text-sm text-gray-500' }, 'Ascend through infinite progression')
                        ),
                        React.createElement(
                            'div',
                            { className: 'text-right' },
                            React.createElement(
                                'div',
                                { className: 'mb-3' },
                                React.createElement('div', { className: 'text-4xl font-bold text-purple-400 tracking-wider' }, points),
                                React.createElement('p', { className: 'text-xs text-gray-500 mt-1' }, 'POINTS')
                            ),
                            React.createElement('div', { className: 'text-xs text-gray-600' }, `Spent: ${totalSpent}`)
                        )
                    )
                ),

                // Controls
                React.createElement(
                    'div',
                    { className: 'bg-gray-900 px-6 py-4 border-b border-gray-800 sticky top-0 z-10' },
                    React.createElement(
                        'div',
                        { className: 'max-w-7xl mx-auto flex gap-3' },
                        React.createElement(
                            'button',
                            {
                                onClick: addPoints,
                                className: 'px-4 py-2 bg-purple-900 hover:bg-purple-800 text-purple-200 text-sm font-mono border border-purple-700 transition-colors'
                            },
                            '+ 100 POINTS'
                        ),
                        React.createElement(
                            'button',
                            {
                                onClick: reset,
                                className: 'px-4 py-2 bg-gray-800 hover:bg-gray-700 text-gray-300 text-sm font-mono border border-gray-700 transition-colors flex items-center gap-2'
                            },
                            React.createElement(RotateIcon),
                            ' RESET'
                        )
                    )
                ),

                // Skill Tree Grid
                React.createElement(
                    'div',
                    { className: 'px-6 py-8' },
                    React.createElement(
                        'div',
                        { className: 'max-w-7xl mx-auto' },
                        React.createElement(
                            'div',
                            { className: 'grid grid-cols-1 lg:grid-cols-2 gap-8' },
                            Object.entries(skills).map(([skillName, skill]) =>
                                React.createElement(
                                    'div',
                                    {
                                        key: skillName,
                                        style: {
                                            opacity: skill.requires && !skill.requires.every(req => skills[req].level > 0) ? 0.5 : 1,
                                        },
                                        className: 'group transition-opacity'
                                    },
                                    React.createElement(
                                        'div',
                                        { className: 'bg-gray-900 border border-gray-800 p-4 hover:border-purple-700 transition-colors' },
                                        
                                        // Skill Header
                                        React.createElement(
                                            'div',
                                            { className: 'flex justify-between items-start mb-3' },
                                            React.createElement(
                                                'div',
                                                { className: 'flex-1' },
                                                React.createElement('h3', { className: 'text-sm font-bold text-gray-100 uppercase tracking-widest mb-1' }, skillName),
                                                React.createElement('p', { className: 'text-xs text-gray-500' }, skill.description)
                                            ),
                                            React.createElement(
                                                'div',
                                                { className: 'ml-4 text-right' },
                                                React.createElement('div', { className: 'text-lg font-bold text-purple-400' }, skill.level),
                                                React.createElement('p', { className: 'text-xs text-gray-600' }, 'LVL')
                                            )
                                        ),

                                        // Requirements
                                        skill.requires && React.createElement(
                                            'div',
                                            { className: 'mb-3 pb-3 border-t border-gray-800' },
                                            React.createElement('p', { className: 'text-xs text-gray-600 mb-1' }, 'REQUIRES:'),
                                            React.createElement(
                                                'div',
                                                { className: 'flex flex-wrap gap-1' },
                                                skill.requires.map(req =>
                                                    React.createElement(
                                                        'span',
                                                        {
                                                            key: req,
                                                            className: `text-xs px-2 py-1 border ${
                                                                skills[req].level > 0
                                                                    ? 'border-purple-600 bg-purple-950 text-purple-300'
                                                                    : 'border-gray-700 bg-gray-800 text-gray-500'
                                                            }`
                                                        },
                                                        req
                                                    )
                                                )
                                            )
                                        ),

                                        // Cost and Controls
                                        React.createElement(
                                            'div',
                                            { className: 'flex items-center justify-between pt-3 border-t border-gray-800' },
                                            React.createElement(
                                                'div',
                                                { className: 'text-sm' },
                                                React.createElement(
                                                    'span',
                                                    { className: skill.level > 0 ? 'text-gray-500' : '' },
                                                    'Cost: ',
                                                    React.createElement('span', { className: 'font-bold text-gray-300' }, skill.cost)
                                                )
                                            ),
                                            React.createElement(
                                                'div',
                                                { className: 'flex gap-2' },
                                                React.createElement(
                                                    'button',
                                                    {
                                                        onClick: () => downgrade(skillName),
                                                        disabled: skill.level === 0,
                                                        className: 'w-8 h-8 flex items-center justify-center bg-gray-800 hover:bg-gray-700 disabled:bg-gray-950 disabled:text-gray-700 text-gray-400 hover:text-gray-300 border border-gray-700 transition-colors disabled:cursor-not-allowed'
                                                    },
                                                    React.createElement(MinusIcon)
                                                ),
                                                React.createElement(
                                                    'button',
                                                    {
                                                        onClick: () => upgrade(skillName),
                                                        disabled: !canUpgrade(skillName),
                                                        className: `w-8 h-8 flex items-center justify-center border transition-colors disabled:cursor-not-allowed ${
                                                            canUpgrade(skillName)
                                                                ? 'bg-purple-900 hover:bg-purple-800 text-purple-200 border-purple-700 hover:border-purple-600'
                                                                : 'bg-gray-950 text-gray-600 border-gray-800'
                                                        }`
                                                    },
                                                    React.createElement(PlusIcon)
                                                )
                                            )
                                        )
                                    )
                                )
                            )
                        )
                    )
                ),

                // Footer Info
                React.createElement(
                    'div',
                    { className: 'border-t border-gray-800 bg-gray-950 px-6 py-6 mt-8' },
                    React.createElement(
                        'div',
                        { className: 'max-w-7xl mx-auto' },
                        React.createElement('p', { className: 'text-xs text-gray-600' }, 'Unlock skills by meeting their requirements. Costs increase with each level. Reach the apex.')
                    )
                )
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(SkillTreeGame));
    </script>
</body>
</html>
