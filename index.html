<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Codex – PDF Reader</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Jetbrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-0: #0a0a0a;
            --bg-1: #121212;
            --bg-2: #1a1a1a;
            --bg-3: #242424;
            --text-primary: #ffffff;
            --text-secondary: #b3b3b3;
            --text-tertiary: #808080;
            --accent: #6366f1;
            --accent-dark: #4f46e5;
            --accent-light: #818cf8;
            --border: rgba(255, 255, 255, 0.08);
            --border-light: rgba(255, 255, 255, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            user-select: none;
        }

        html, body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background: var(--bg-0);
            color: var(--text-primary);
        }

        input, textarea {
            user-select: text;
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
        }

        /* ===== UPLOAD SCREEN ===== */
        .upload-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 3rem;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        .upload-screen::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle 600px at 50% 50%, rgba(99, 102, 241, 0.04), transparent 80%);
            pointer-events: none;
        }

        .upload-screen::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle 400px at 80% 20%, rgba(99, 102, 241, 0.02), transparent 70%);
            pointer-events: none;
        }

        .upload-screen.hidden {
            display: none;
        }

        .upload-content {
            position: relative;
            z-index: 1;
            text-align: center;
            max-width: 500px;
            animation: fadeInDown 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .upload-logo {
            font-family: 'Jetbrains Mono', monospace;
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--accent-light) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: fadeInDown 0.8s cubic-bezier(0.4, 0, 0.2, 1) 0.1s both;
        }

        .upload-subtitle {
            color: var(--text-tertiary);
            font-size: 0.9rem;
            font-weight: 400;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s cubic-bezier(0.4, 0, 0.2, 1) 0.2s both;
        }

        #fileInput {
            display: none;
        }

        .upload-label {
            cursor: pointer;
            width: 100%;
            position: relative;
            animation: fadeInDown 0.8s cubic-bezier(0.4, 0, 0.2, 1) 0.3s both;
        }

        .upload-box {
            padding: 4rem 2rem;
            border: 1px solid var(--border);
            border-radius: 1.25rem;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.03) 0%, rgba(99, 102, 241, 0.01) 100%);
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .upload-box::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(129, 140, 248, 0.1), transparent);
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }

        .upload-label:hover .upload-box {
            border-color: var(--accent);
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.06) 0%, rgba(99, 102, 241, 0.02) 100%);
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(99, 102, 241, 0.15);
        }

        .upload-label:hover .upload-box::before {
            opacity: 1;
        }

        .upload-icon {
            width: 56px;
            height: 56px;
            color: var(--accent);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1;
        }

        .upload-label:hover .upload-icon {
            transform: scale(1.2) translateY(-6px);
            color: var(--accent-light);
        }

        .upload-icon svg {
            width: 100%;
            height: 100%;
            stroke-width: 1.5;
        }

        .upload-text h2 {
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: -0.015em;
            position: relative;
            z-index: 1;
        }

        .upload-text p {
            font-size: 0.95rem;
            color: var(--text-secondary);
            font-weight: 400;
            position: relative;
            z-index: 1;
        }

        .upload-hint {
            margin-top: 2rem;
            font-size: 0.85rem;
            color: var(--text-tertiary);
            animation: fadeInDown 0.8s cubic-bezier(0.4, 0, 0.2, 1) 0.4s both;
        }

        /* ===== READER SCREEN ===== */
        .reader-screen {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .reader-screen.hidden {
            display: none;
        }

        /* CONTROLS AUTO-HIDE */
        .reader-screen.fullscreen {
            --ui-opacity: 0;
        }

        .reader-screen:hover {
            --ui-opacity: 1;
        }

        .reader-screen.fullscreen .header,
        .reader-screen.fullscreen .footer {
            opacity: 0;
            pointer-events: none;
        }

        /* ===== HEADER ===== */
        .header {
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            background: rgba(10, 10, 10, 0.7);
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1.5rem;
            height: 64px;
            opacity: 1;
            transition: opacity 0.3s ease 0.5s;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex: 1;
            min-width: 0;
        }

        .book-info {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex: 1;
            min-width: 0;
        }

        .book-icon {
            font-size: 1.5rem;
            color: var(--accent);
            flex-shrink: 0;
            opacity: 0.8;
        }

        .title-info {
            flex: 1;
            min-width: 0;
        }

        .title-info h2 {
            font-family: 'Jetbrains Mono', monospace;
            font-weight: 600;
            font-size: 0.95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: 0.01em;
            line-height: 1.2;
        }

        .title-info p {
            font-size: 0.75rem;
            color: var(--text-tertiary);
            margin-top: 0.25rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .btn {
            padding: 0.5rem;
            border: none;
            border-radius: 0.6rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-secondary);
            position: relative;
            font-size: 1rem;
            height: 40px;
            width: 40px;
            opacity: 0.7;
        }

        .btn:hover {
            color: var(--accent);
            background: rgba(99, 102, 241, 0.15);
            opacity: 1;
        }

        .btn:active {
            transform: scale(0.92);
        }

        /* ===== READER CONTENT ===== */
        .reader-content {
            flex: 1;
            overflow: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            background: var(--bg-0);
        }

        #pdfCanvas {
            max-width: 100%;
            max-height: 100%;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.5);
            border-radius: 0.75rem;
            image-rendering: crisp-edges;
            transition: all 0.3s ease;
            border: 1px solid var(--border-light);
            animation: pageEntry 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes pageEntry {
            from {
                opacity: 0;
                transform: scale(0.98);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        #pdfCanvas.inverted {
            filter: invert(0.92) hue-rotate(180deg);
        }

        /* ===== FOOTER ===== */
        .footer {
            border-top: 1px solid var(--border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            background: rgba(10, 10, 10, 0.7);
            padding: 0.75rem 1.5rem;
            height: 60px;
            opacity: 1;
            transition: opacity 0.3s ease 0.5s;
        }

        .footer-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            height: 100%;
        }

        .page-nav {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            justify-content: center;
        }

        .nav-btn {
            padding: 0.5rem;
            border: none;
            border-radius: 0.6rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-secondary);
            height: 40px;
            width: 40px;
            font-size: 1.2rem;
            font-weight: 500;
            opacity: 0.7;
        }

        .nav-btn:hover:not(:disabled) {
            color: var(--accent);
            background: rgba(99, 102, 241, 0.15);
            opacity: 1;
        }

        .nav-btn:disabled {
            opacity: 0.2;
            cursor: not-allowed;
        }

        #pageSlider {
            flex: 1;
            height: 3px;
            cursor: pointer;
            border-radius: 2px;
            appearance: none;
            -webkit-appearance: none;
            outline: none;
            background: rgba(255, 255, 255, 0.1);
            min-width: 80px;
            margin: 0 1rem;
        }

        #pageSlider::-webkit-slider-thumb {
            appearance: none;
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            box-shadow: 0 2px 12px rgba(99, 102, 241, 0.4);
            transition: all 0.2s ease;
        }

        #pageSlider::-webkit-slider-thumb:hover {
            transform: scale(1.4);
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.6);
        }

        #pageSlider::-moz-range-thumb {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            border: none;
            box-shadow: 0 2px 12px rgba(99, 102, 241, 0.4);
        }

        .page-info {
            font-family: 'Jetbrains Mono', monospace;
            font-size: 0.8rem;
            font-weight: 600;
            white-space: nowrap;
            color: var(--text-secondary);
            min-width: 50px;
            text-align: right;
            opacity: 0.7;
        }

        /* ===== BOTTOM CENTER CONTROLS (MINIMAL) ===== */
        .bottom-controls {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            background: rgba(18, 18, 18, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 1rem;
            z-index: 500;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .reader-screen:hover .bottom-controls {
            opacity: 1;
            pointer-events: all;
        }

        .reader-screen.fullscreen .bottom-controls {
            opacity: 0;
            pointer-events: none;
        }

        .zoom-badge {
            font-family: 'Jetbrains Mono', monospace;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            min-width: 40px;
            text-align: center;
            padding: 0 0.25rem;
        }

        .separator {
            width: 1px;
            height: 20px;
            background: rgba(255, 255, 255, 0.1);
        }

        /* ===== FLOATING PROGRESS ===== */
        .progress-ring {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            width: 48px;
            height: 48px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 400;
        }

        .reader-screen:hover .progress-ring {
            opacity: 1;
        }

        .progress-ring-circle {
            stroke: rgba(255, 255, 255, 0.1);
            transition: stroke 0.3s ease;
        }

        .progress-ring-circle-fill {
            stroke: var(--accent);
            transition: stroke-dashoffset 0.3s ease;
            stroke-dasharray: 301.59;
            stroke-dashoffset: 301.59;
        }

        .progress-text {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Jetbrains Mono', monospace;
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--accent);
        }

        /* ===== MODAL ===== */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: var(--bg-1);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 2rem;
            max-width: 380px;
            width: 90%;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6);
            animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            letter-spacing: -0.01em;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 0.6rem;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            font-family: 'Jetbrains Mono', monospace;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(99, 102, 241, 0.1);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .modal-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .modal-btn {
            flex: 1;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 0.6rem;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            background: transparent;
            color: var(--text-primary);
        }

        .modal-btn.primary {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .modal-btn.primary:hover {
            background: var(--accent-light);
            border-color: var(--accent-light);
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.3);
        }

        .modal-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* ===== LOADING ===== */
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            z-index: 100;
        }

        @keyframes spin {
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .loading.hidden {
            display: none;
        }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 2rem;
            padding: 1rem 1.5rem;
            background: var(--bg-2);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            color: var(--text-primary);
            font-size: 0.9rem;
            z-index: 950;
            animation: slideInUp 0.3s ease;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        @keyframes slideInUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .toast.error {
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }

        @media (max-width: 768px) {
            .header {
                padding: 0.75rem 1rem;
                height: 56px;
            }

            .footer {
                height: 56px;
            }

            .reader-content {
                padding: 1rem;
            }

            .bottom-controls {
                bottom: 1rem;
                gap: 0.5rem;
            }

            .btn {
                width: 36px;
                height: 36px;
            }

            .nav-btn {
                width: 36px;
                height: 36px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- UPLOAD SCREEN -->
        <div class="upload-screen">
            <div class="upload-content">
                <div class="upload-logo">codex</div>
                <p class="upload-subtitle">Premium PDF Reader</p>

                <label class="upload-label">
                    <input type="file" id="fileInput" accept=".pdf">
                    <div class="upload-box">
                        <div class="upload-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                <path d="M12 2v20M2 12h20" stroke-linecap="round" stroke-linejoin="round"/>
                                <path d="M6 6l12 12M18 6L6 18" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </div>
                        <div class="upload-text">
                            <h2>Upload PDF</h2>
                            <p>Drag or click to select</p>
                        </div>
                    </div>
                </label>

                <p class="upload-hint">Supports all standard PDF formats</p>
            </div>
        </div>

        <!-- READER SCREEN -->
        <div class="reader-screen hidden">
            <div class="header">
                <div class="header-left">
                    <div class="book-info">
                        <span class="book-icon">📖</span>
                        <div class="title-info">
                            <h2 id="fileName">Document.pdf</h2>
                            <p id="pageCounter">1 / 100</p>
                        </div>
                    </div>
                </div>

                <div class="header-controls">
                    <button class="btn" id="jumpBtn" title="Go to page">⤴</button>
                    <button class="btn" id="fullscreenBtn" title="Fullscreen">⛶</button>
                    <button class="btn" id="closeBtn" title="Close">✕</button>
                </div>
            </div>

            <div class="reader-content">
                <canvas id="pdfCanvas"></canvas>
            </div>

            <div class="footer">
                <div class="footer-controls">
                    <button class="nav-btn" id="prevBtn">‹</button>
                    <input type="range" id="pageSlider" min="1" max="1" value="1">
                    <button class="nav-btn" id="nextBtn">›</button>
                    <div class="page-info" id="pageInfo">1 / 1</div>
                </div>
            </div>

            <div class="bottom-controls">
                <button class="btn" id="zoomOut" title="Zoom Out">−</button>
                <span class="zoom-badge" id="zoomDisplay">100%</span>
                <button class="btn" id="zoomIn" title="Zoom In">+</button>
                <div class="separator"></div>
                <button class="btn" id="settingsBtn" title="Settings">⚙</button>
            </div>

            <svg class="progress-ring" viewBox="0 0 48 48">
                <circle class="progress-ring-circle" cx="24" cy="24" r="20" fill="none" stroke-width="2"/>
                <circle class="progress-ring-circle-fill" cx="24" cy="24" r="20" fill="none" stroke-width="2"/>
                <text class="progress-text" x="50%" y="50%">0%</text>
            </svg>
        </div>
    </div>

    <!-- MODAL -->
    <div class="modal" id="jumpModal">
        <div class="modal-content">
            <h2 class="modal-title">Jump to Page</h2>
            <div class="input-group">
                <label>Enter page number</label>
                <input type="number" id="jumpInput" min="1" placeholder="Page">
            </div>
            <div class="modal-buttons">
                <button class="modal-btn" onclick="closeModal('jumpModal')">Cancel</button>
                <button class="modal-btn primary" id="jumpConfirm">Go</button>
            </div>
        </div>
    </div>

    <div class="loading hidden" id="loading"></div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        // STATE
        let pdfDoc = null;
        let currentPage = 1;
        let totalPages = 0;
        let zoom = 100;

        // ELEMENTS
        const fileInput = document.getElementById('fileInput');
        const uploadScreen = document.querySelector('.upload-screen');
        const readerScreen = document.querySelector('.reader-screen');
        const canvas = document.getElementById('pdfCanvas');
        const ctx = canvas.getContext('2d', { alpha: false });

        const fileName = document.getElementById('fileName');
        const pageCounter = document.getElementById('pageCounter');
        const pageInfo = document.getElementById('pageInfo');
        const pageSlider = document.getElementById('pageSlider');
        const progressText = document.querySelector('.progress-text');
        const progressFill = document.querySelector('.progress-ring-circle-fill');

        const zoomIn = document.getElementById('zoomIn');
        const zoomOut = document.getElementById('zoomOut');
        const zoomDisplay = document.getElementById('zoomDisplay');

        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const jumpBtn = document.getElementById('jumpBtn');
        const settingsBtn = document.getElementById('settingsBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const closeBtn = document.getElementById('closeBtn');
        const loading = document.getElementById('loading');

        const jumpModal = document.getElementById('jumpModal');
        const jumpInput = document.getElementById('jumpInput');
        const jumpConfirm = document.getElementById('jumpConfirm');

        let renderTimeout;

        // FILE UPLOAD
        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            showLoading();
            try {
                const arrayBuffer = await file.arrayBuffer();
                pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;

                totalPages = pdfDoc.numPages;
                currentPage = 1;
                zoom = 100;

                fileName.textContent = file.name;
                pageSlider.max = totalPages;
                pageSlider.value = 1;

                uploadScreen.classList.add('hidden');
                readerScreen.classList.remove('hidden');

                await renderPage(1);
                updateUI();
            } catch (err) {
                console.error('Error loading PDF:', err);
                showToast('Error loading PDF', 'error');
                hideLoading();
            }
        });

        // DRAG AND DROP
        document.addEventListener('dragover', (e) => {
            e.preventDefault();
        });

        document.addEventListener('drop', (e) => {
            e.preventDefault();
            const file = e.dataTransfer.files[0];
            if (file?.type === 'application/pdf') {
                fileInput.files = e.dataTransfer.files;
                fileInput.dispatchEvent(new Event('change'));
            }
        });

        // RENDER PAGE
        async function renderPage(pageNum) {
            if (!pdfDoc) return;

            try {
                const page = await pdfDoc.getPage(pageNum);
                const viewport = page.getViewport({ scale: zoom / 100 });

                canvas.width = viewport.width;
                canvas.height = viewport.height;

                const renderContext = {
                    canvasContext: ctx,
                    viewport: viewport
                };

                await page.render(renderContext).promise;
                hideLoading();
            } catch (err) {
                console.error('Error rendering:', err);
            }
        }

        // NAVIGATION
        prevBtn.addEventListener('click', () => {
            if (currentPage > 1) {
                currentPage--;
                pageSlider.value = currentPage;
                renderAndUpdate();
            }
        });

        nextBtn.addEventListener('click', () => {
            if (currentPage < totalPages) {
                currentPage++;
                pageSlider.value = currentPage;
                renderAndUpdate();
            }
        });

        pageSlider.addEventListener('input', (e) => {
            currentPage = parseInt(e.target.value);
            clearTimeout(renderTimeout);
            renderTimeout = setTimeout(renderAndUpdate, 100);
        });

        // ZOOM
        zoomIn.addEventListener('click', () => {
            zoom = Math.min(300, zoom + 10);
            zoomDisplay.textContent = zoom + '%';
            renderAndUpdate();
        });

        zoomOut.addEventListener('click', () => {
            zoom = Math.max(50, zoom - 10);
            zoomDisplay.textContent = zoom + '%';
            renderAndUpdate();
        });

        // JUMP TO PAGE
        jumpBtn.addEventListener('click', () => {
            jumpInput.value = currentPage;
            jumpInput.max = totalPages;
            openModal('jumpModal');
            jumpInput.focus();
            jumpInput.select();
        });

        jumpConfirm.addEventListener('click', () => {
            const page = parseInt(jumpInput.value);
            if (page >= 1 && page <= totalPages) {
                currentPage = page;
                pageSlider.value = currentPage;
                renderAndUpdate();
                closeModal('jumpModal');
            }
        });

        jumpInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') jumpConfirm.click();
        });

        // FULLSCREEN
        fullscreenBtn.addEventListener('click', () => {
            readerScreen.classList.toggle('fullscreen');
            fullscreenBtn.classList.toggle('active');
        });

        // CLOSE
        closeBtn.addEventListener('click', () => {
            uploadScreen.classList.remove('hidden');
            readerScreen.classList.remove('hidden', 'fullscreen');
            pdfDoc = null;
            fileInput.value = '';
        });

        // UI UPDATES
        function updateUI() {
            prevBtn.disabled = currentPage === 1;
            nextBtn.disabled = currentPage === totalPages;
            pageCounter.textContent = `${currentPage} / ${totalPages}`;
            pageInfo.textContent = `${currentPage} / ${totalPages}`;

            const progress = (currentPage / totalPages) * 100;
            progressText.textContent = Math.round(progress) + '%';
            const circumference = 301.59;
            progressFill.style.strokeDashoffset = circumference - (progress / 100 * circumference);
        }

        function renderAndUpdate() {
            showLoading();
            renderPage(currentPage);
            updateUI();
        }

        // HELPERS
        function showLoading() {
            loading.classList.remove('hidden');
        }

        function hideLoading() {
            loading.classList.add('hidden');
        }

        function openModal(id) {
            document.getElementById(id).classList.add('active');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.animation = 'slideInUp 0.3s ease reverse';
                setTimeout(() => toast.remove(), 300);
            }, 2500);
        }

        // KEYBOARD SHORTCUTS
        document.addEventListener('keydown', (e) => {
            if (!pdfDoc || document.activeElement.tagName === 'INPUT') return;

            switch(e.key) {
                case 'ArrowRight':
                case ' ':
                    nextBtn.click();
                    e.preventDefault();
                    break;
                case 'ArrowLeft':
                    prevBtn.click();
                    e.preventDefault();
                    break;
                case '+':
                case '=':
                    zoomIn.click();
                    e.preventDefault();
                    break;
                case '-':
                    zoomOut.click();
                    e.preventDefault();
                    break;
                case 'g':
                    jumpBtn.click();
                    e.preventDefault();
                    break;
                case 'f':
                    fullscreenBtn.click();
                    e.preventDefault();
                    break;
                case 'Escape':
                    if (jumpModal.classList.contains('active')) {
                        closeModal('jumpModal');
                    } else if (readerScreen.classList.contains('fullscreen')) {
                        fullscreenBtn.click();
                    }
                    break;
            }
        });

        // HIDE UI ON INACTIVITY
        let uiTimeout;
        readerScreen.addEventListener('mousemove', () => {
            clearTimeout(uiTimeout);
        });

        readerScreen.addEventListener('mouseleave', () => {
            uiTimeout = setTimeout(() => {
                if (readerScreen.classList.contains('fullscreen')) {
                    // Auto-hide already handled by CSS
                }
            }, 3000);
        });
    </script>
</body>
</html>
