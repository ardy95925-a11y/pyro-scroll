<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CineView">
    <title>CineView - YouTube Client</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body, #root { width: 100%; height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }
        * { -webkit-tap-highlight-color: transparent; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-black">
    <div id="root"></div>
    
    <script>
        const { useState, useRef, useEffect } = React;
        const e = React.createElement;

        const YouTubeClient = () => {
            const [videos, setVideos] = useState([]);
            const [searchQuery, setSearchQuery] = useState('');
            const [loading, setLoading] = useState(false);
            const [selectedVideo, setSelectedVideo] = useState(null);
            const [view, setView] = useState('search');
            const [history, setHistory] = useState(() => {
                try { return JSON.parse(localStorage.getItem('youtube_history') || '[]'); }
                catch { return []; }
            });
            const [favorites, setFavorites] = useState(() => {
                try { return JSON.parse(localStorage.getItem('youtube_favorites') || '[]'); }
                catch { return []; }
            });

            const INVIDIOUS_INSTANCES = [
                'https://invidious.jfreedomland.com',
                'https://yewtu.be',
                'https://invidious.nerdvpn.de',
            ];

            const formatDuration = (seconds) => {
                if (!seconds) return 'N/A';
                const hours = Math.floor(seconds / 3600);
                const minutes = Math.floor((seconds % 3600) / 60);
                const secs = seconds % 60;
                if (hours > 0) return `${hours}:${minutes.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                return `${minutes}:${secs.toString().padStart(2, '0')}`;
            };

            const formatViews = (views) => {
                if (!views) return '0';
                const num = parseInt(views);
                if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
                if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
                return num.toString();
            };

            const searchVideos = async (query) => {
                if (!query.trim()) return;
                setLoading(true);
                
                for (const instance of INVIDIOUS_INSTANCES) {
                    try {
                        const response = await fetch(
                            `${instance}/api/v1/search?q=${encodeURIComponent(query)}&type=video&maxResults=12`,
                            { signal: AbortSignal.timeout(5000) }
                        );
                        
                        if (!response.ok) throw new Error('Failed');
                        const data = await response.json();
                        
                        if (Array.isArray(data) && data.length > 0) {
                            const videosData = data.map((item) => ({
                                id: item.videoId,
                                title: item.title,
                                description: item.description || '',
                                thumbnail: item.videoThumbnails?.[item.videoThumbnails.length - 1]?.url || 'https://via.placeholder.com/320x180',
                                channelTitle: item.author || 'Unknown',
                                publishedAt: new Date(item.publishedText || Date.now()).toISOString(),
                                viewCount: formatViews(item.viewCount),
                                duration: formatDuration(item.lengthSeconds),
                            }));
                            setVideos(videosData);
                            setView('search');
                            setLoading(false);
                            return;
                        }
                    } catch (error) {
                        continue;
                    }
                }
                setLoading(false);
            };

            const handleVideoClick = (video) => {
                setSelectedVideo(video);
                const newHistory = [
                    { ...video, viewedAt: new Date().toISOString() },
                    ...history.filter(h => h.id !== video.id)
                ].slice(0, 50);
                setHistory(newHistory);
                localStorage.setItem('youtube_history', JSON.stringify(newHistory));
            };

            const toggleFavorite = (video) => {
                const isFav = favorites.some(fav => fav.id === video.id);
                const newFavorites = isFav
                    ? favorites.filter(fav => fav.id !== video.id)
                    : [...favorites, video];
                setFavorites(newFavorites);
                localStorage.setItem('youtube_favorites', JSON.stringify(newFavorites));
            };

            const isFavorited = (videoId) => favorites.some(fav => fav.id === videoId);

            const displayVideos = 
                view === 'history' ? history.slice(0, 50) :
                view === 'favorites' ? favorites :
                videos;

            return e('div', { className: 'min-h-screen', style: { background: 'linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%)' } },
                // Header
                e('header', { className: 'sticky top-0 z-40 backdrop-blur-md bg-black/40 border-b border-white/5 px-6 py-4' },
                    e('div', { className: 'max-w-7xl mx-auto flex items-center justify-between' },
                        e('div', { className: 'flex items-center gap-3' },
                            e('div', { className: 'w-10 h-10 rounded-lg bg-gradient-to-br from-red-600 to-red-800 flex items-center justify-center text-white font-bold' }, '▶'),
                            e('h1', { className: 'text-2xl font-black tracking-tight text-white' }, 'CineView')
                        ),
                        e('nav', { className: 'hidden md:flex gap-1 bg-white/5 rounded-full p-1' },
                            e('button', {
                                onClick: () => setView('search'),
                                className: `px-6 py-2 rounded-full transition-all font-medium text-sm ${view === 'search' ? 'bg-white text-black' : 'text-white hover:bg-white/10'}`
                            }, 'Search'),
                            e('button', {
                                onClick: () => setView('history'),
                                className: `px-6 py-2 rounded-full transition-all font-medium text-sm ${view === 'history' ? 'bg-white text-black' : 'text-white hover:bg-white/10'}`
                            }, 'History'),
                            e('button', {
                                onClick: () => setView('favorites'),
                                className: `px-6 py-2 rounded-full transition-all font-medium text-sm ${view === 'favorites' ? 'bg-white text-black' : 'text-white hover:bg-white/10'}`
                            }, 'Saved')
                        )
                    )
                ),

                // Search Bar
                view === 'search' && e('div', { className: 'sticky top-16 z-30 bg-black/20 backdrop-blur-sm border-b border-white/5 px-6 py-4' },
                    e('div', { className: 'max-w-7xl mx-auto' },
                        e('form', { onSubmit: (evt) => { evt.preventDefault(); searchVideos(searchQuery); }, className: 'relative' },
                            e('input', {
                                type: 'text',
                                value: searchQuery,
                                onChange: (evt) => setSearchQuery(evt.target.value),
                                placeholder: 'Search videos...',
                                className: 'w-full bg-white/10 text-white placeholder-white/40 rounded-xl pl-4 pr-4 py-3 border border-white/20 focus:border-white/40 focus:bg-white/15 transition-all outline-none text-base'
                            })
                        )
                    )
                ),

                // Main Content
                e('main', { className: 'px-6 py-8 max-w-7xl mx-auto' },
                    // Video Modal
                    selectedVideo && e('div', { className: 'fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-end md:items-center justify-center p-4' },
                        e('div', { className: 'w-full max-w-4xl bg-gradient-to-b from-white/10 to-white/5 backdrop-blur-xl rounded-3xl overflow-hidden border border-white/20 shadow-2xl animate-fade-in' },
                            e('div', { className: 'relative bg-black aspect-video' },
                                e('iframe', {
                                    width: '100%',
                                    height: '100%',
                                    src: `https://www.youtube.com/embed/${selectedVideo.id}?autoplay=1`,
                                    frameBorder: '0',
                                    allow: 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture',
                                    allowFullScreen: true,
                                    className: 'absolute inset-0'
                                }),
                                e('button', {
                                    onClick: () => setSelectedVideo(null),
                                    className: 'absolute top-4 right-4 bg-black/60 hover:bg-black/80 rounded-full p-2 transition-colors z-10 md:hidden text-white'
                                }, '✕')
                            ),
                            e('div', { className: 'p-6 md:p-8' },
                                e('div', { className: 'flex gap-3 mb-4 flex-col md:flex-row md:items-start md:justify-between' },
                                    e('div', { className: 'flex-1 min-w-0' },
                                        e('h2', { className: 'text-xl md:text-2xl font-black text-white mb-2 leading-tight' }, selectedVideo.title),
                                        e('p', { className: 'text-white/60 text-sm' }, selectedVideo.channelTitle)
                                    ),
                                    e('button', {
                                        onClick: () => {
                                            toggleFavorite(selectedVideo);
                                            setSelectedVideo({ ...selectedVideo });
                                        },
                                        className: 'flex items-center gap-2 px-4 py-2 bg-red-600/20 hover:bg-red-600/40 text-red-400 rounded-lg transition-all font-medium self-start'
                                    }, (isFavorited(selectedVideo.id) ? '❤️' : '🤍') + ' ' + (isFavorited(selectedVideo.id) ? 'Saved' : 'Save'))
                                ),
                                e('p', { className: 'text-white/70 text-sm md:text-base mb-6 leading-relaxed' }, selectedVideo.description.substring(0, 300) + '...'),
                                e('div', { className: 'grid grid-cols-3 gap-4 pt-4 border-t border-white/10' },
                                    e('div', {}, 
                                        e('p', { className: 'text-white/40 text-xs uppercase tracking-wider mb-1' }, 'Views'),
                                        e('p', { className: 'text-lg font-bold text-white' }, selectedVideo.viewCount)
                                    ),
                                    e('div', {},
                                        e('p', { className: 'text-white/40 text-xs uppercase tracking-wider mb-1' }, 'Duration'),
                                        e('p', { className: 'text-lg font-bold text-white' }, selectedVideo.duration)
                                    ),
                                    e('div', {},
                                        e('p', { className: 'text-white/40 text-xs uppercase tracking-wider mb-1' }, 'Published'),
                                        e('p', { className: 'text-lg font-bold text-white' }, new Date(selectedVideo.publishedAt).toLocaleDateString())
                                    )
                                ),
                                e('div', { className: 'mt-6 flex gap-3' },
                                    e('a', {
                                        href: `https://www.youtube.com/watch?v=${selectedVideo.id}`,
                                        target: '_blank',
                                        rel: 'noopener noreferrer',
                                        className: 'flex-1 flex items-center justify-center gap-2 bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-lg transition-all'
                                    }, '▶ Watch on YouTube'),
                                    e('button', {
                                        onClick: () => setSelectedVideo(null),
                                        className: 'px-6 py-3 bg-white/10 hover:bg-white/20 text-white font-medium rounded-lg transition-all'
                                    }, 'Close')
                                )
                            )
                        )
                    ),

                    // Empty State
                    displayVideos.length === 0 && !loading && e('div', { className: 'text-center py-20' },
                        e('div', { className: 'text-white/30 text-4xl mb-4' }, view === 'search' ? '🔍' : view === 'history' ? '🕐' : '❤️'),
                        e('h3', { className: 'text-xl font-bold text-white mb-2' },
                            view === 'search' ? 'Start searching' : view === 'history' ? 'No history yet' : 'No saved videos'
                        ),
                        e('p', { className: 'text-white/50' },
                            view === 'search' ? 'Enter a search term above' : view === 'history' ? 'Videos you watch appear here' : 'Save videos to watch later'
                        )
                    ),

                    // Loading
                    loading && e('div', { className: 'flex items-center justify-center py-20' },
                        e('div', { className: 'space-y-4 text-center' },
                            e('div', { className: 'w-12 h-12 mx-auto rounded-full border-2 border-white/20 border-t-white animate-spin' }),
                            e('p', { className: 'text-white/60' }, 'Loading videos...')
                        )
                    ),

                    // Video Grid
                    displayVideos.length > 0 && e('div', { className: 'grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6' },
                        displayVideos.map((video) =>
                            e('button', {
                                key: video.id,
                                onClick: () => handleVideoClick(video),
                                className: 'group cursor-pointer text-left transition-all duration-300 hover:scale-105'
                            },
                                e('div', { className: 'relative overflow-hidden rounded-2xl mb-4 aspect-video bg-white/5 border border-white/10 group-hover:border-white/30 transition-all' },
                                    e('img', {
                                        src: video.thumbnail,
                                        alt: video.title,
                                        className: 'w-full h-full object-cover group-hover:scale-110 transition-transform duration-300'
                                    }),
                                    e('div', { className: 'absolute inset-0 bg-black/0 group-hover:bg-black/30 transition-colors flex items-center justify-center' },
                                        e('span', { className: 'text-white opacity-0 group-hover:opacity-100 transition-opacity text-2xl' }, '▶')
                                    ),
                                    e('button', {
                                        onClick: (evt) => {
                                            evt.stopPropagation();
                                            toggleFavorite(video);
                                        },
                                        className: 'absolute top-3 right-3 bg-black/60 hover:bg-red-600 rounded-full p-2 transition-all opacity-0 group-hover:opacity-100'
                                    }, isFavorited(video.id) ? '❤️' : '🤍')
                                ),
                                e('h3', { className: 'font-bold text-white text-sm md:text-base leading-snug line-clamp-2 group-hover:text-white/80 transition-colors' }, video.title),
                                e('p', { className: 'text-white/50 text-xs md:text-sm mt-2' }, video.channelTitle),
                                e('div', { className: 'flex gap-2 text-xs text-white/40 mt-2' }, video.viewCount + ' views')
                            )
                        )
                    )
                ),

                // Mobile Nav
                e('div', { className: 'md:hidden fixed bottom-6 left-6 right-6 flex gap-2 bg-white/5 backdrop-blur-md rounded-2xl p-1 border border-white/10' },
                    e('button', {
                        onClick: () => setView('search'),
                        className: `flex-1 py-2 rounded-xl transition-all text-sm font-medium ${view === 'search' ? 'bg-white text-black' : 'text-white'}`
                    }, 'Search'),
                    e('button', {
                        onClick: () => setView('history'),
                        className: `flex-1 py-2 rounded-xl transition-all text-sm font-medium ${view === 'history' ? 'bg-white text-black' : 'text-white'}`
                    }, 'History'),
                    e('button', {
                        onClick: () => setView('favorites'),
                        className: `flex-1 py-2 rounded-xl transition-all text-sm font-medium ${view === 'favorites' ? 'bg-white text-black' : 'text-white'}`
                    }, 'Saved')
                )
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(YouTubeClient));
    </script>
</body>
</html>
